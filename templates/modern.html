<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{name}} - Resume</title>
<style>
  :root {
    --primary: #2563eb;
    --bg: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background: #f1f5f9;
    padding: 40px 20px;
  }
  .page {
    max-width: 800px;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .header {
    background: var(--primary);
    color: white;
    padding: 40px;
  }
  .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .header .title { font-size: 18px; opacity: 0.9; margin-bottom: 16px; }
  .header .contact { display: flex; flex-wrap: wrap; gap: 12px; font-size: 14px; opacity: 0.85; }
  .header .contact a { color: white; text-decoration: none; }
  .content { padding: 32px 40px; }
  .section { margin-bottom: 28px; }
  .section h2 {
    font-size: 16px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--primary);
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px; margin-bottom: 16px;
  }
  .section h3 { font-size: 16px; font-weight: 600; }
  .section .meta { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
  .section ul { list-style: none; }
  .section li {
    font-size: 14px; line-height: 1.6;
    padding-left: 20px; position: relative; margin-bottom: 6px;
  }
  .section li::before {
    content: "\2022"; position: absolute; left: 4px; color: var(--primary);
  }
  .skills-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skills-tags span {
    background: #eff6ff; color: var(--primary);
    padding: 4px 12px; border-radius: 20px; font-size: 13px;
  }
  @media print {
    body { padding: 0; background: white; }
    .page { box-shadow: none; border-radius: 0; }
    .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{name}}</h1>
    <div class="title">{{title}}</div>
    <div class="contact">
      <span>{{email}}</span>
      <span>{{phone}}</span>
      <span>{{location}}</span>
      <a href="{{linkedin}}">LinkedIn</a>
      <a href="{{github}}">GitHub</a>
    </div>
  </div>
  <div class="content">
    {{content}}
  </div>
</div>
</body>
</html>
